name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read

    steps:
      - name: Install vokuprompt
        run: |
          set -euo pipefail

          INSTALL_DIR="/usr/local/share/vokuprompt"
          TARBALL_URL="https://voku.github.io/vokuprompt/vokuprompt-linux-amd64.tar.gz"

          sudo mkdir -p "$INSTALL_DIR"
          curl -fsSL "$TARBALL_URL" | sudo tar -xz -C "$INSTALL_DIR"

          sudo chmod +x "$INSTALL_DIR/vokuprompt"
          sudo ln -sf "$INSTALL_DIR/vokuprompt" /usr/local/bin/vokuprompt

      - name: Verify vokuprompt installation
        run: vokuprompt categories
